play_music_assistant_on_sonos:
  sequence:
  - action: timer.start
    metadata: {}
    target:
      entity_id: timer.radio_turned_on_by_automation
    data: {}
  - action: music_assistant.play_media
    metadata: {}
    data:
      media_id: '{{ media_id }}'
    target:
      entity_id: media_player.argon_radio_2i_305890754e1c_3
  - wait_template: '{{ states(''media_player.argon_radio_2i_305890754e1c'') == "playing"
      }}'
    continue_on_timeout: false
    timeout: '10'
  - action: script.force_play_media
    data:
      target_media_player: '{{ entity_id }}'
      media_content_id: x-rincon-stream:RINCON_804AF2CAFA8001400
      media_content_type: music
  - action: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.allow_apple_music_popup_on_shelly
  alias: play_music_assistant_on_sonos
  description: ''
  fields:
    media_id:
      name: Media ID
      description: The media ID to play
      required: true
      example: spotify:track:123456789
    entity_id:
      name: Sonos player entity ID
      description: The entity ID of the sonos player to stream the queue to.
      required: true
      example: media_player.kokken
play_npo_radio_2_on_sonos:
  fields:
    entity_id:
      description: The media player entity to play on
      example: media_player.kokken
      required: true
      selector:
        entity:
          domain: media_player
  sequence:
  - if:
    - condition: state
      entity_id: input_text.commercials_on_npo_radio_2
      state: 'True'
    then:
    - action: media_player.shuffle_set
      metadata: {}
      data:
        shuffle: true
      target:
        entity_id: '{{ entity_id }}'
    - action: media_player.play_media
      data:
        media:
          media_content_id: '{{ states(''input_text.npo_radio_2_filler_playlist_id'')
            }}'
          media_content_type: favorite_item_id
          metadata: {}
      target:
        entity_id: '{{ entity_id }}'
    - action: input_text.set_value
