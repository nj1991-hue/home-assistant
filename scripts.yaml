  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.kokken_is_grouped
      state: 'on'
    then:
    - action: input_number.increment
      metadata: {}
      data: {}
      target:
        entity_id: input_number.kokken_volume
  - if:
    - condition: state
      entity_id: binary_sensor.entre_is_grouped
      state: 'on'
    then:
    - action: input_number.increment
      metadata: {}
      data: {}
      target:
        entity_id:
        - input_number.entre_volume
  - if:
    - condition: state
      entity_id: binary_sensor.stue_is_grouped
      state: 'on'
    then:
    - action: input_number.increment
      metadata: {}
      data: {}
      target:
        entity_id:
        - input_number.stue_volume
  - action: input_number.increment
    metadata: {}
    data: {}
    target:
      entity_id: input_number.spisestue_volume
  alias: increase_master_volume
  description: ''
decrease_master_volume:
  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.kokken_is_grouped
      state: 'on'
    then:
    - action: input_number.decrement
      metadata: {}
      data: {}
      target:
        entity_id: input_number.kokken_volume
  - if:
    - condition: state
      entity_id: binary_sensor.entre_is_grouped
      state: 'on'
    then:
    - action: input_number.decrement
      metadata: {}
      data: {}
      target:
        entity_id:
        - input_number.entre_volume
  - if:
    - condition: state
      entity_id: binary_sensor.stue_is_grouped
      state: 'on'
    then:
    - action: input_number.decrement
      metadata: {}
      data: {}
      target:
        entity_id:
        - input_number.stue_volume
  - action: input_number.decrement
    metadata: {}
    data: {}
    target:
      entity_id: input_number.spisestue_volume
  alias: decrease_master_volume
  description: ''
play_pause_all_grouped_speakers:
  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.any_speaker_in_group_is_playing
      state: 'on'
    then:
    - action: media_player.media_pause
      metadata: {}
      data: {}
      target:
        entity_id:
        - media_player.spisestue
    - if:
      - condition: state
        entity_id: binary_sensor.kokken_is_grouped
        state: 'on'
      then:
      - action: media_player.media_pause
        metadata: {}
        data: {}
        target:
          entity_id: media_player.kokken
    - if:
      - condition: state
        entity_id: binary_sensor.entre_is_grouped
        state: 'on'
      then:
      - action: media_player.media_pause
        metadata: {}
        data: {}
        target:
          entity_id: media_player.entre
    - if:
      - condition: state
        entity_id: binary_sensor.stue_is_grouped
        state: 'on'
      then:
      - action: media_player.media_pause
        metadata: {}
        data: {}
        target:
          entity_id: media_player.stue
    else:
    - action: media_player.media_play
      metadata: {}
      data: {}
      target:
        entity_id:
        - media_player.spisestue
    - if:
      - condition: state
        entity_id: binary_sensor.kokken_is_grouped
        state: 'on'
      then:
      - action: media_player.media_play
        metadata: {}
        data: {}
        target:
          entity_id: media_player.kokken
    - if:
      - condition: state
        entity_id: binary_sensor.entre_is_grouped
        state: 'on'
      then:
      - action: media_player.media_play
        metadata: {}
        data: {}
        target:
          entity_id: media_player.entre
    - if:
      - condition: state
        entity_id: binary_sensor.stue_is_grouped
        state: 'on'
      then:
      - action: media_player.media_play
        metadata: {}
        data: {}
        target:
          entity_id: media_player.stue
  alias: play_pause_all_grouped_speakers
  description: ''
