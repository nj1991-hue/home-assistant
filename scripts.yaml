toggle_hue:
  alias: toggle_hue
  description: 'Toggle a Hue light: turn off if on, otherwise activate a Hue scene'
  mode: single
  fields:
    entity_id:
      name: Light entity
      description: The light entity to toggle
      required: true
      selector:
        entity:
          domain: light
    scene_entity_id:
      name: Scene entity
      description: The scene to toggle
      required: true
      selector:
        entity:
          domain: scene
  sequence:
  - if:
    - condition: template
      value_template: '{{ is_state(entity_id, ''on'') }}'
    then:
    - target:
        entity_id: '{{ entity_id }}'
      action: light.turn_off
    else:
    - action: scene.turn_on
      metadata: {}
      target:
        entity_id: '{{ scene_entity_id }}'
      data: {}
