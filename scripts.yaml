play_preset_on_dab_radio:
  alias: play_preset_on_dab_radio
  description: ''
  fields:
    preset_path:
      description: Media content ID of the preset channel to play
      example: DAB/preset/3
      required: true
      selector:
        text:
  sequence:
  - action: timer.start
    target:
      entity_id: timer.radio_turned_on_by_automation
  - action: media_player.turn_on
    target:
      entity_id: media_player.argon_radio_2i_305890754e1c
  - action: media_player.play_media
    target:
      entity_id: media_player.argon_radio_2i_305890754e1c
    data:
      media:
        media_content_id: '{{ preset_path }}'
        media_content_type: channel
        metadata: {}
  mode: single
force_play_media:
  fields:
    target_media_player:
      description: The media player entity to play on
      example: media_player.kokken
      required: true
      selector:
        entity:
          domain: media_player
    media_content_id:
      description: The media content ID (e.g., stream URL)
      required: true
      selector:
        text:
    media_content_type:
      description: The media content type (e.g., music, video)
      required: true
      selector:
        text:
  sequence:
  - variables:
      initial_source: '{{ state_attr(target_media_player, ''source'') }}'
  - action: media_player.play_media
    target:
      entity_id: '{{ target_media_player }}'
    data:
      media:
        media_content_id: '{{ media_content_id }}'
        media_content_type: '{{ media_content_type }}'
        metadata: {}
  - if:
    - condition: template
      value_template: '{{ initial_source == ''AirPlay'' }}'
    then:
    - delay:
        seconds: 1
    - if:
      - condition: template
        value_template: '{{ not is_state(target_media_player, ''playing'') }}'
      then:
      - action: media_player.play_media
        target:
          entity_id: '{{ target_media_player }}'
        data:
          media:
            media_content_id: '{{ media_content_id }}'
            media_content_type: '{{ media_content_type }}'
            metadata: {}
  - action: pyscript.disable_sonos_feels_lucky
    metadata: {}
    data:
      entity_id: '{{ target_media_player }}'
  - action: media_player.volume_mute
    target:
      entity_id: '{{ target_media_player }}'
    data:
      is_volume_muted: false
  alias: force_play_media
  description: 'Plays media on the selected media player. If the source was AirPlay
    before starting, waits 1 second and retries if not playing.

    '
play_radio_preset_on_sonos:
  fields:
    entity_id:
      description: The media player entity to play on
      example: media_player.kokken
      required: true
      selector:
        entity:
          domain: media_player
    preset_path:
      description: Media content ID of the preset channel to play
      example: DAB/preset/3
      required: true
      selector:
        text:
  sequence:
  - action: script.play_preset_on_dab_radio
    data:
      preset_path: '{{ preset_path }}'
  - action: script.force_play_media
    data:
      target_media_player: '{{ entity_id }}'
      media_content_id: x-rincon-stream:RINCON_804AF2CAFA8001400
      media_content_type: music
  - action: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.allow_radio_popup_on_shelly
  alias: play_radio_preset_on_sonos
